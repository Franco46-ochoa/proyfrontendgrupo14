<div class="card p-4 mt-4">
    <h3 class="text-primary fw-bold mb-4">Nueva Transacción</h3>
    <form [formGroup]="transaccionForm" (ngSubmit)="guardar()">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label text-secondary">Tipo</label>
          <select class="form-select" formControlName="tipo">
            <option value="Venta">Venta</option>
            <option value="Compra">Compra</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label text-secondary">Cantidad</label>
          <input type="number" class="form-control" formControlName="cantidad">
        </div>
        <div class="col-md-3">
          <label class="form-label text-secondary">Precio Unitario</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" formControlName="precioUnitario">
          </div>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold text-primary">Total (Automático)</label>
          <div class="input-group">
            <span class="input-group-text bg-light">$</span>
            <input type="number" class="form-control bg-light fw-bold" formControlName="total">
          </div>
        </div>
      </div>
      <div class="d-flex justify-content-end mt-4">
        <button type="submit" class="btn bg-primary text-white" [disabled]="transaccionForm.invalid">Registrar Transacción</button>
      </div>
    </form>
  </div>
