<div class="card p-4 mt-4">
    <h3 class="text-primary fw-bold mb-4">{{ esEdicion ? 'Editar' : 'Nueva' }} Transacción</h3>
    <form [formGroup]="transaccionForm" (ngSubmit)="guardar()">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label text-secondary">Tipo</label>
          <select class="form-select" formControlName="tipo">
            <option value="venta">Venta</option>
            <option value="compra">Compra</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label text-secondary">Producto</label>
          <select class="form-select" formControlName="productoId">
            <option [ngValue]="null">Seleccione un producto</option>
            <option *ngFor="let p of productos" [ngValue]="p.id">{{ p.nombre }} ({{ p.codigo }})</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label text-secondary">Sucursal</label>
          <select class="form-select" formControlName="sucursalId">
            <option [ngValue]="null">Seleccione una sucursal</option>
            <option *ngFor="let s of sucursales" [ngValue]="s.id">{{ s.nombre }}</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label text-secondary">Cantidad</label>
          <input type="number" class="form-control" formControlName="cantidad" min="1">
          <small *ngIf="stockDisponible > 0 && transaccionForm.get('tipo')?.value === 'venta'" class="text-muted">
            Stock disponible: <strong>{{ stockDisponible }}</strong>
          </small>
          <small *ngIf="stockDisponible === 0 && transaccionForm.get('productoId')?.value && transaccionForm.get('sucursalId')?.value && transaccionForm.get('tipo')?.value === 'venta'" class="text-danger">
            Sin stock registrado en esta sucursal
          </small>
        </div>
        <div class="col-md-3">
          <label class="form-label text-secondary">Precio Unitario</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" formControlName="precioUnitario" min="0.01" step="0.01">
          </div>
        </div>
        <div class="col-md-3">
          <label class="form-label text-secondary">Fecha</label>
          <input type="date" class="form-control" formControlName="fecha">
        </div>
        <div class="col-md-12">
          <label class="form-label text-secondary">Observaciones</label>
          <textarea class="form-control" formControlName="observaciones" rows="2"></textarea>
        </div>
      </div>
      <div class="d-flex justify-content-end mt-4">
        <button type="button" class="btn btn-outline-secondary me-2" routerLink="/transacciones">Cancelar</button>
        <button type="submit" class="btn bg-primary text-white" [disabled]="transaccionForm.invalid">
          {{ esEdicion ? 'Actualizar' : 'Registrar' }} Transacción
        </button>
      </div>
      <div *ngIf="errorMsg" class="alert alert-danger d-flex align-items-center mt-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
        <div>{{ errorMsg }}</div>
      </div>
    </form>
  </div>
