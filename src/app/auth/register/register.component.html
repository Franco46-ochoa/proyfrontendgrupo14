<div class="container mt-5">

  <div class="card shadow p-4 mx-auto" style="max-width: 500px;">

    <h2 class="text-center mb-4">
      Registro
    </h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label>Nombre</label>

        <input type="text" class="form-control" formControlName="nombre">
      </div>

      <div class="mb-3">
        <label>Apellido</label>

        <input type="text" class="form-control" formControlName="apellido">
      </div>

      <div class="mb-3">
        <label>Email</label>

        <input type="email" class="form-control" formControlName="email">
      </div>

      <div class="mb-3">
        <label>Contraseña</label>

        <input type="password" class="form-control" formControlName="password">
      </div>

      <div class="mb-3">
        <label>Rol</label>

        <select class="form-select" formControlName="rol">

          <option value="dueno">
            Dueño
          </option>

          <option value="administrador">
            Administrador
          </option>

          <option value="gerente">
            Gerente
          </option>

          <option value="empleado">
            Empleado
          </option>

        </select>

      </div>

      <div *ngIf="registerForm.get('rol')?.value !== 'dueno'" class="mb-3">
        <label>Código de invitación</label>
        <input type="text" class="form-control" formControlName="codigoInvitacion" placeholder="Ej: EMP-A3F2K9B1" />
        <small *ngIf="errorCodigo" class="text-danger">{{ errorCodigo }}</small>
      </div>

      <div *ngIf="registerForm.get('rol')?.value === 'empleado'" class="mb-3">

        <label>Departamento</label>

        <select class="form-select" formControlName="departamento">

          <option value="">
            Seleccione un departamento
          </option>

          <option value="comercial">
            Comercial
          </option>

          <option value="operativo">
            Operativo
          </option>

        </select>

      </div>

      <button type="submit" class="btn btn-success w-100">

        Registrarse

      </button>

      <div class="d-flex align-items-center my-3">
        <hr class="flex-grow-1">
        <span class="mx-3 text-muted">o</span>
        <hr class="flex-grow-1">
      </div>

      <div class="google-auth-container mt-3 d-flex justify-content-center">
        <div id="google-register-btn-container"></div>
      </div>

    </form>

  </div>

</div>
