<div class="container mt-5">

  <div class="card shadow p-4 mx-auto" style="max-width: 500px;">

    <h2 class="text-center mb-4">
      Registro
    </h2>

    <form
      [formGroup]="registerForm"
      (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label>Nombre</label>

        <input
          type="text"
          class="form-control"
          formControlName="nombre">
      </div>

      <div class="mb-3">
        <label>Email</label>

        <input
          type="email"
          class="form-control"
          formControlName="email">
      </div>

      <div class="mb-3">
        <label>Contraseña</label>

        <input
          type="password"
          class="form-control"
          formControlName="password">
      </div>

      <div class="mb-3">
        <label>Rol</label>

        <select
          class="form-select"
          formControlName="rol">

          <option value="dueno">
            Dueño
          </option>

          <option value="gerente">
            Gerente
          </option>

          <option value="empleado">
            Empleado
          </option>

        </select>

      </div>

      <div *ngIf="registerForm.get('rol')?.value !== 'dueno'" class="mb-3">
        <label>Código de invitación</label>
        <input
          type="text"
          class="form-control"
          formControlName="codigoInvitacion"
          placeholder="Ej: EMP-A3F2K9B1"
        />
        <small *ngIf="errorCodigo" class="text-danger">{{ errorCodigo }}</small>
      </div>

      <button
        type="submit"
        class="btn btn-success w-100">

        Registrarse

      </button>

    </form>

  </div>

</div>
