<div class="card p-4 mt-4">
  <h3 class="text-primary fw-bold mb-4">{{ editando ? 'Editar Producto' : 'Nuevo Producto' }}</h3>

  <div *ngIf="error" class="alert alert-danger" role="alert">
    {{ error }}
    <button
      *ngIf="editando && productoId"
      type="button"
      class="btn btn-sm btn-outline-danger ms-2"
      (click)="cargarProducto(productoId!)">
      Reintentar
    </button>
  </div>

  <div *ngIf="cargando" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-2 text-muted mb-0">Cargando producto...</p>
  </div>

  <form *ngIf="!cargando" [formGroup]="productoForm" (ngSubmit)="guardar()">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label text-secondary">Nombre del Producto</label>
        <input
          type="text"
          class="form-control"
          formControlName="nombre"
          placeholder="Ej: Leche Descremada"
          [class.is-invalid]="campoInvalido('nombre')">
        <div class="invalid-feedback">El nombre es obligatorio.</div>
      </div>

      <div class="col-md-6">
        <label class="form-label text-secondary">Código (Único)</label>
        <input
          type="text"
          class="form-control"
          formControlName="codigo"
          placeholder="Ej: PROD-001"
          [class.is-invalid]="campoInvalido('codigo')">
        <div class="invalid-feedback">El código es obligatorio.</div>
      </div>

      <div class="col-md-4">
        <label class="form-label text-secondary">Categoría</label>
        <select
          class="form-select"
          formControlName="categoria"
          [class.is-invalid]="campoInvalido('categoria')">
          <option value="">Seleccione...</option>
          <option value="Lácteos">Lácteos</option>
          <option value="Almacén">Almacén</option>
          <option value="Panadería">Panadería</option>
          <option value="Bebidas">Bebidas</option>
        </select>
        <div class="invalid-feedback">Seleccione una categoría.</div>
      </div>

      <div class="col-md-4">
        <label class="form-label text-secondary">Precio de Compra</label>
        <div class="input-group">
          <span class="input-group-text">$</span>
          <input
            type="number"
            step="0.01"
            min="0.01"
            class="form-control"
            formControlName="precioCompra"
            placeholder="0.00"
            [class.is-invalid]="campoInvalido('precioCompra')">
        </div>
        <div class="invalid-feedback d-block" *ngIf="campoInvalido('precioCompra')">
          Ingrese un precio mayor a 0.
        </div>
      </div>

      <div class="col-md-4">
        <label class="form-label text-secondary">Unidad de Medida</label>
        <input
          type="text"
          class="form-control"
          formControlName="unidadMedida"
          placeholder="Ej: Litro, Kg, Unidad"
          [class.is-invalid]="campoInvalido('unidadMedida')">
        <div class="invalid-feedback">La unidad de medida es obligatoria.</div>
      </div>
    </div>

    <div class="d-flex justify-content-end mt-4">
      <a routerLink="/productos" class="btn btn-outline-primary me-3">Cancelar</a>
      <button
        type="submit"
        class="btn bg-primary text-white"
        [disabled]="productoForm.invalid || guardando">
        <span *ngIf="guardando" class="spinner-border spinner-border-sm me-1" role="status"></span>
        {{ guardando ? 'Guardando...' : (editando ? 'Actualizar' : 'Guardar') }}
      </button>
    </div>
  </form>
</div>
