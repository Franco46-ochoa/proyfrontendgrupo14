<div class="card p-4 mt-4">
    <h3 class="text-primary fw-bold mb-4">Nuevo Producto</h3>
  
    <form [formGroup]="productoForm" (ngSubmit)="guardar()">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label text-secondary">Nombre del Producto</label>
          <input type="text" class="form-control" formControlName="nombre" placeholder="Ej: Leche Descremada">
        </div>
  
        <div class="col-md-6">
          <label class="form-label text-secondary">Código (Único)</label>
          <input type="text" class="form-control" formControlName="codigo" placeholder="Ej: PROD-001">
        </div>
  
        <div class="col-md-4">
          <label class="form-label text-secondary">Categoría</label>
          <select class="form-select" formControlName="categoria">
            <option value="">Seleccione...</option>
            <option value="Lácteos">Lácteos</option>
            <option value="Almacén">Almacén</option>
            <option value="Panadería">Panadería</option>
            <option value="Bebidas">Bebidas</option>
          </select>
        </div>
  
        <div class="col-md-4">
          <label class="form-label text-secondary">Precio de Compra</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" formControlName="precioCompra" placeholder="0.00">
          </div>
        </div>
  
        <div class="col-md-4">
          <label class="form-label text-secondary">Unidad de Medida</label>
          <input type="text" class="form-control" formControlName="unidadMedida" placeholder="Ej: Litro, Kg, Unidad">
        </div>
      </div>
  
      <div class="d-flex justify-content-end mt-4">
        <button type="button" class="btn btn-outline-primary me-3">Cancelar</button>
        <button type="submit" class="btn bg-primary text-white" [disabled]="productoForm.invalid">Guardar</button>
      </div>
    </form>
  </div>
