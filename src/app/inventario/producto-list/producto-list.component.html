<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="text-primary fw-bold">Productos</h2>
      <div>
        <button *ngIf="esDuenoOAdmin()" class="btn btn-outline-info me-2" (click)="exportarExcel()">
          <i class="bi bi-file-earmark-excel text-success"></i> Excel
        </button>
        <button class="btn bg-primary text-white">
          <i class="bi bi-plus-lg"></i> Nuevo Producto
        </button>
      </div>
    </div>
  
    <div class="table-responsive">
      <table class="table custom-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Código</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio Compra</th>
            <th>U. Medida</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let prod of productos">
            <td>{{ prod.id }}</td>
            <td><span class="badge bg-secondary">{{ prod.codigo }}</span></td>
            <td>{{ prod.nombre }}</td>
            <td>{{ prod.categoria }}</td>
            <td>${{ prod.precioCompra }}</td>
            <td>{{ prod.unidadMedida }}</td>
            <td>
              <button class="btn btn-sm btn-outline-primary me-2">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm bg-danger text-white" (click)="eliminarProducto(prod.id)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
