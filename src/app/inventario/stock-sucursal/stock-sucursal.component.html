<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
      <h2 class="text-primary fw-bold mb-0">Stock por Sucursal</h2>
      <div>
        <button *ngIf="esDuenoOAdmin()" class="btn btn-outline-info me-2" (click)="exportarExcel()">
          <i class="bi bi-file-earmark-excel text-success"></i> Excel
        </button>
        <button *ngIf="esDuenoOAdmin()" class="btn btn-outline-info" (click)="exportarPdf()">
          <i class="bi bi-file-earmark-pdf text-danger"></i> PDF
        </button>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table custom-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Producto</th>
            <th>Sucursal</th>
            <th>Stock Actual</th>
            <th>Stock Mínimo</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of inventario">
            <td>{{ item.id }}</td>
            <td>{{ item.producto }}</td>
            <td>{{ item.sucursal }}</td>
            <!-- Indicador visual de stock crítico -->
            <td [ngClass]="{'text-danger fw-bold': item.stockActual < item.stockMinimo, 'text-success': item.stockActual >= item.stockMinimo}">
              {{ item.stockActual }}
            </td>
            <td>{{ item.stockMinimo }}</td>
            <td>
              <span class="badge" [ngClass]="item.stockActual < item.stockMinimo ? 'bg-danger' : 'bg-success'">
                {{ item.stockActual < item.stockMinimo ? 'Crítico' : 'Normal' }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
