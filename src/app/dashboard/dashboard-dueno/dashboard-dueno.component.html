<div id="dashboard-dueno-pdf" class="dashboard-container py-4">
  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h4 class="fw-bold font-inter text-primary-custom mb-1">Dashboard de Dueño</h4>
      <p class="text-secondary small mb-0">Vista de control comercial y métricas clave</p>
    </div>
    <div class="d-flex align-items-center gap-3">
      <!-- Botones de Exportación -->
      <div class="d-flex gap-2">
        <button class="btn btn-outline-danger d-flex align-items-center gap-2 px-3 rounded-3 shadow-sm" (click)="exportarPdf()" style="height: 52px;">
          <i class="bi bi-file-earmark-pdf fs-5"></i>
          <span class="small fw-bold">PDF</span>
        </button>
        <button class="btn btn-outline-success d-flex align-items-center gap-2 px-3 rounded-3 shadow-sm" (click)="exportarExcel()" style="height: 52px;">
          <i class="bi bi-file-earmark-excel fs-5"></i>
          <span class="small fw-bold">Excel</span>
        </button>
      </div>

      <!-- Widget Dólar  -->
      <app-dolar-card></app-dolar-card>
 
      <!-- Widget Fecha -->
      <div class="d-flex align-items-center gap-3 px-3 py-2 bg-white border rounded-3 shadow-sm font-inter" style="height: 52px;">
        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 32px; height: 32px; background-color: rgba(13, 148, 136, 0.1); color: #0d9488;">
          <i class="bi bi-calendar3 fs-5"></i>
        </div>
        <div class="d-flex flex-column">
          <span class="text-secondary" style="font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; line-height: 1.2;">FECHA ACTUAL</span>
          <span class="text-dark fw-bold" style="font-size: 0.8rem; line-height: 1.2;">{{ fechaActual }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 4 KPI Cards Grid -->
  <div class="row g-4 mb-4">
    <div *ngFor="let kpi of kpis" class="col-12 col-md-6 col-lg-3">
      <app-kpi-card [title]="kpi.title" [value]="kpi.value" [badgeText]="kpi.badgeText" [badgeColor]="kpi.badgeColor"
        [icon]="kpi.icon"></app-kpi-card>
    </div>
  </div>

  <!-- Dos Gráficos Dinámicos  -->
  <div class="row g-4 mb-4">
    <!-- Gráfico 1: Rentabilidad por Sucursal (Barras) -->
    <div class="col-12 col-lg-6">
      <app-chart-card [title]="'Rentabilidad por Sucursal'" [subtitle]="'Ingresos netos por punto de venta'"
        [chartType]="barChartType" [chartData]="barChartData" [chartOptions]="barChartOptions">
      </app-chart-card>
    </div>

    <!-- Gráfico 2: Evolución de Ingresos (Líneas) -->
    <div class="col-12 col-lg-6">
      <app-chart-card [title]="'Evolución de Ingresos'" [subtitle]="'Historial de ganancias (últimos 6 meses)'"
        [chartType]="lineChartType" [chartData]="lineChartData" [chartOptions]="lineChartOptions">
      </app-chart-card>
    </div>
  </div>

  <!-- Mapa de Sucursales -->
  <div class="row g-4 mt-2">
    <div class="col-12">
      <div class="card custom-card p-4">
        <h5 class="fw-bold font-inter text-primary-custom mb-3">Distribución y Estado de Sucursales</h5>

        <!-- Aquí llamamos a tu nuevo componente con datos del backend -->
        <app-sucursal-mapa [sucursales]="sucursales"></app-sucursal-mapa>
      </div>
    </div>
  </div>
</div>
