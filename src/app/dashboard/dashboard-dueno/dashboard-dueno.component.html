<div class="dashboard-container py-4">
  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h4 class="fw-bold font-inter text-primary-custom mb-1">Dashboard de Dueño</h4>
      <p class="text-secondary small mb-0">Vista de control comercial y métricas clave (Día 1)</p>
    </div>
    <div class="d-flex align-items-center gap-3">
      <!-- Botonera de Exportación -->
      <div *ngIf="esDuenoOAdmin()" class="d-flex gap-2">
        <button class="btn btn-outline-success d-flex align-items-center gap-2 px-3 rounded-3 shadow-sm" (click)="abrirModal('excel')" style="height: 38px;">
          <i class="bi bi-file-earmark-excel"></i>
          <span class="small fw-bold">Excel</span>
        </button>
        <button class="btn btn-outline-danger d-flex align-items-center gap-2 px-3 rounded-3 shadow-sm" (click)="abrirModal('pdf')" style="height: 38px;">
          <i class="bi bi-file-earmark-pdf"></i>
          <span class="small fw-bold">PDF</span>
        </button>
      </div>

      <span class="badge bg-white text-secondary border px-3 py-2 fs-7 rounded-3 shadow-sm font-inter" style="height: 38px; display: inline-flex; align-items: center;">
        <i class="bi bi-calendar3 me-2"></i> Jun 2026
      </span>
    </div>
  </div>

  <!-- 4 KPI Cards Grid -->
  <div class="row g-4 mb-4">
    <div *ngFor="let kpi of kpis" class="col-12 col-md-6 col-lg-3">
      <app-kpi-card [title]="kpi.title" [value]="kpi.value" [badgeText]="kpi.badgeText" [badgeColor]="kpi.badgeColor"
        [icon]="kpi.icon"></app-kpi-card>
    </div>
  </div>

  <!-- Dos Gráficos Dinámicos (Día 3) -->
  <div class="row g-4 mb-4">
    <!-- Gráfico 1: Rentabilidad por Sucursal (Barras) -->
    <div class="col-12 col-lg-6">
      <app-chart-card
        [title]="'Rentabilidad por Sucursal'"
        [subtitle]="'Ingresos netos por punto de venta'"
        [chartType]="barChartType"
        [chartData]="barChartData"
        [chartOptions]="barChartOptions">
      </app-chart-card>
    </div>

    <!-- Gráfico 2: Evolución de Ingresos (Líneas) -->
    <div class="col-12 col-lg-6">
      <app-chart-card
        [title]="'Evolución de Ingresos'"
        [subtitle]="'Historial de ganancias (últimos 6 meses)'"
        [chartType]="lineChartType"
        [chartData]="lineChartData"
        [chartOptions]="lineChartOptions">
      </app-chart-card>
    </div>
  </div>

  <!-- 3. NUEVA SECCIÓN: Mapa de Sucursales -->
  <div class="row g-4 mt-2">
    <div class="col-12">
      <div class="card custom-card p-4">
        <h5 class="fw-bold font-inter text-primary-custom mb-3">Distribución y Estado de Sucursales</h5>

        <!-- Aquí llamamos a tu nuevo componente con datos del backend -->
        <app-sucursal-mapa [sucursales]="sucursales"></app-sucursal-mapa>
      </div>
    </div>
  </div>

  <!-- Modal de Exportación Centralizado -->
  <div *ngIf="mostrarModalExportar" class="modal-backdrop-custom d-flex align-items-center justify-content-center" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.4); z-index: 1050;">
    <div class="modal-content-custom card p-4 shadow-lg border border-light-subtle" style="width: 90%; max-width: 500px; background: white; border-radius: 16px;">
      <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
        <div class="d-flex align-items-center gap-2">
          <i class="bi fs-4" [ngClass]="modalTipo === 'excel' ? 'bi-file-earmark-excel text-success' : 'bi-file-earmark-pdf text-danger'"></i>
          <h5 class="fw-bold font-inter mb-0 text-primary-custom" style="font-size: 1.15rem;">
            Exportar Reportes ({{ modalTipo | uppercase }})
          </h5>
        </div>
        <button class="btn-close" (click)="cerrarModal()"></button>
      </div>

      <p class="text-secondary small mb-4">
        Selecciona el módulo del cual deseas generar el reporte comercial descargable.
      </p>

      <div class="d-flex flex-column gap-2">
        <!-- Botones de Acción para Excel -->
        <ng-container *ngIf="modalTipo === 'excel'">
          <button class="btn btn-outline-primary text-start d-flex align-items-center justify-content-between py-2.5 px-3 rounded-3" (click)="descargarExcel('transacciones')">
            <span><i class="bi bi-cart3 me-2"></i> Reporte de Transacciones</span>
            <i class="bi bi-download"></i>
          </button>
          <button class="btn btn-outline-primary text-start d-flex align-items-center justify-content-between py-2.5 px-3 rounded-3" (click)="descargarExcel('gastos')">
            <span><i class="bi bi-cash-coin me-2"></i> Reporte de Gastos</span>
            <i class="bi bi-download"></i>
          </button>
          <button class="btn btn-outline-primary text-start d-flex align-items-center justify-content-between py-2.5 px-3 rounded-3" (click)="descargarExcel('inventario')">
            <span><i class="bi bi-clipboard-data me-2"></i> Control de Stock (Inventario)</span>
            <i class="bi bi-download"></i>
          </button>
          <button class="btn btn-outline-primary text-start d-flex align-items-center justify-content-between py-2.5 px-3 rounded-3" (click)="descargarExcel('productos')">
            <span><i class="bi bi-box-seam me-2"></i> Catálogo de Productos</span>
            <i class="bi bi-download"></i>
          </button>
        </ng-container>

        <!-- Botones de Acción para PDF (Maquetados) -->
        <ng-container *ngIf="modalTipo === 'pdf'">
          <button class="btn btn-outline-primary text-start d-flex align-items-center justify-content-between py-2.5 px-3 rounded-3" (click)="descargarPdf('transacciones')">
            <span><i class="bi bi-cart3 me-2"></i> Reporte de Transacciones PDF</span>
            <span class="badge bg-secondary font-inter fs-8" style="font-size: 0.75rem;">Backend</span>
          </button>
          <button class="btn btn-outline-primary text-start d-flex align-items-center justify-content-between py-2.5 px-3 rounded-3" (click)="descargarPdf('gastos')">
            <span><i class="bi bi-cash-coin me-2"></i> Reporte de Gastos PDF</span>
            <span class="badge bg-secondary font-inter fs-8" style="font-size: 0.75rem;">Backend</span>
          </button>
          <button class="btn btn-outline-primary text-start d-flex align-items-center justify-content-between py-2.5 px-3 rounded-3" (click)="descargarPdf('inventario')">
            <span><i class="bi bi-clipboard-data me-2"></i> Control de Stock PDF</span>
            <span class="badge bg-secondary font-inter fs-8" style="font-size: 0.75rem;">Backend</span>
          </button>
          <button class="btn btn-outline-primary text-start d-flex align-items-center justify-content-between py-2.5 px-3 rounded-3" (click)="descargarPdf('reportes')">
            <span><i class="bi bi-cpu me-2"></i> Reporte de Agente IA PDF</span>
            <span class="badge bg-secondary font-inter fs-8" style="font-size: 0.75rem;">Backend</span>
          </button>
        </ng-container>
      </div>

      <div class="text-end mt-4 border-top pt-3">
        <button class="btn btn-secondary font-inter" (click)="cerrarModal()">Cerrar</button>
      </div>
    </div>
  </div>
</div>
