<div class="dashboard-container py-4">
  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h4 class="fw-bold font-inter text-primary-custom mb-1">Dashboard de Dueño</h4>
      <p class="text-secondary small mb-0">Vista de control comercial y métricas clave (Día 1)</p>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="badge bg-white text-secondary border px-3 py-2 fs-7 rounded-3 shadow-sm font-inter">
        <i class="bi bi-calendar3 me-2"></i> Jun 2026
      </span>
    </div>
  </div>

  <!-- 4 KPI Cards Grid -->
  <div class="row g-4 mb-4">
    <div *ngFor="let kpi of kpis" class="col-12 col-md-6 col-lg-3">
      <app-kpi-card
        [title]="kpi.title"
        [value]="kpi.value"
        [badgeText]="kpi.badgeText"
        [badgeColor]="kpi.badgeColor"
        [icon]="kpi.icon"
      ></app-kpi-card>
    </div>
  </div>

  <!-- Chart Card Grid -->
  <div class="row g-4">
    <div class="col-12">
      <app-chart-card></app-chart-card>
    </div>
  </div>
</div>
