<div class="card custom-card p-3">
    <div class="card-body d-flex flex-column justify-content-between">
        <div class="d-flex align-items-center justify-content-between mb-2">
            <h6 class="text-secondary font-inter fw-semibold mb-0">{{ title }}</h6>
            <div *ngIf="icon" class="icon-container d-flex align-items-center justify-content-center">
                <i class="bi {{ icon }} text-primary-custom fs-5"></i>
            </div>
        </div>

        <div class="d-flex align-items-center justify-content-between mt-3">
            <h3 class="font-inter fw-bold mb-0 text-primary-custom">{{ value }}</h3>

            <span *ngIf="badgeText" class="badge bg-{{ badgeColor }} fs-6 rounded-pill px-3 py-1">
                {{ badgeText }}
            </span>
        </div>
    </div>
</div>
