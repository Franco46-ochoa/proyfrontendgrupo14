<div class="card custom-card p-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h5 class="card-title font-inter fw-bold mb-1 text-primary-custom">Rendimiento de Ventas</h5>
            <p class="text-secondary small mb-0">Evolución de ingresos en los últimos 6 meses</p>
        </div>
        <div class="chart-badge text-success bg-success-light px-2.5 py-1 rounded-pill small fw-semibold">
            <i class="bi bi-arrow-up-short"></i> +12% vs año anterior
        </div>
    </div>

    <!-- Contenedor del Gráfico -->
    <div class="chart-wrapper font-inter">
        <!-- Eje Y con líneas de cuadrícula -->
        <div class="chart-y-axis">
            <div class="y-grid-line"><span class="y-label">$10k</span></div>
            <div class="y-grid-line"><span class="y-label">$8k</span></div>
            <div class="y-grid-line"><span class="y-label">$6k</span></div>
            <div class="y-grid-line"><span class="y-label">$4k</span></div>
            <div class="y-grid-line"><span class="y-label">$2k</span></div>
            <div class="y-grid-line-zero"><span class="y-label">$0</span></div>
        </div>

        <!-- Área de las barras -->
        <div class="chart-bars-area">
            <div class="bar-container">
                <div class="bar-value">$4,200</div>
                <div class="bar-bar" style="--bar-height: 42%;"></div>
                <span class="bar-label">Ene</span>
            </div>
            <div class="bar-container">
                <div class="bar-value">$5,800</div>
                <div class="bar-bar" style="--bar-height: 58%;"></div>
                <span class="bar-label">Feb</span>
            </div>
            <div class="bar-container">
                <div class="bar-value">$7,400</div>
                <div class="bar-bar" style="--bar-height: 74%;"></div>
                <span class="bar-label">Mar</span>
            </div>
            <div class="bar-container">
                <div class="bar-value">$6,100</div>
                <div class="bar-bar" style="--bar-height: 61%;"></div>
                <span class="bar-label">Abr</span>
            </div>
            <div class="bar-container">
                <div class="bar-value">$8,900</div>
                <div class="bar-bar" style="--bar-height: 89%;"></div>
                <span class="bar-label">May</span>
            </div>
            <div class="bar-container highlight">
                <div class="bar-value">$9,500</div>
                <div class="bar-bar" style="--bar-height: 95%;"></div>
                <span class="bar-label fw-bold text-primary-custom">Jun</span>
            </div>
        </div>
    </div>

    <!-- Leyenda y nota al pie -->
    <div class="d-flex align-items-center justify-content-between mt-4 pt-3 border-top border-light">
        <div class="d-flex gap-3 small">
            <div class="d-flex align-items-center gap-1 text-secondary">
                <span class="legend-color-dot bg-primary-custom"></span> Ventas Realizadas
            </div>
            <div class="d-flex align-items-center gap-1 text-secondary">
                <span class="legend-color-dot bg-secondary-custom"></span> Meta de Ventas
            </div>
        </div>
        <span class="text-muted small">Última actualización: hace unos momentos</span>
    </div>
</div>
