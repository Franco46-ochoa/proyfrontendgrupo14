<div class="card p-4">
    <h3 class="text-primary fw-bold mb-4">{{ esEdicion ? 'Editar' : 'Nueva' }} Sucursal</h3>

    <div *ngIf="errorMsg" class="alert alert-danger alert-dismissible fade show" role="alert">
      {{ errorMsg }}
      <button type="button" class="btn-close" (click)="errorMsg = ''"></button>
    </div>

    <form [formGroup]="sucursalForm" (ngSubmit)="guardar()">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label text-secondary">Nombre de Sucursal</label>
          <input type="text" class="form-control" formControlName="nombre" placeholder="Ej: Sucursal Norte">
          <div *ngIf="sucursalForm.get('nombre')?.invalid && sucursalForm.get('nombre')?.touched" class="text-danger small mt-1">
            El nombre es requerido.
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label text-secondary">Teléfono</label>
          <input type="text" class="form-control" formControlName="telefono" placeholder="Ej: 388-1234567">
        </div>

        <div class="col-12">
          <label class="form-label text-secondary">Dirección</label>
          <input type="text" class="form-control" formControlName="direccion" placeholder="Ej: Av. General Paz 123">
        </div>

        <div class="col-md-4">
          <label class="form-label text-secondary">Zona</label>
          <select class="form-select" formControlName="zonaId">
            <option [ngValue]="null">Seleccione una zona</option>
            <option *ngFor="let z of zonas" [ngValue]="z.id">{{ z.nombre }}</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label text-secondary">Latitud</label>
          <input type="number" class="form-control" formControlName="lat" placeholder="-24.185" step="any">
        </div>

        <div class="col-md-4">
          <label class="form-label text-secondary">Longitud</label>
          <input type="number" class="form-control" formControlName="lng" placeholder="-65.299" step="any">
        </div>

        <div class="col-md-4" *ngIf="!esEdicion">
          <label class="form-label text-secondary">Gerentes (máx)</label>
          <input type="number" class="form-control" formControlName="gerentesMax" min="1">
        </div>

        <div class="col-md-4" *ngIf="!esEdicion">
          <label class="form-label text-secondary">Empleados (máx)</label>
          <input type="number" class="form-control" formControlName="empleadosMax" min="1">
        </div>
      </div>

      <div class="d-flex justify-content-end mt-4">
        <button type="button" class="btn btn-outline-secondary me-2" routerLink="/sucursales">Cancelar</button>
        <button type="submit" class="btn bg-primary text-white" [disabled]="sucursalForm.invalid">
          {{ esEdicion ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
