<div class="card p-4">
    <h3 class="text-primary fw-bold mb-4">Nueva Sucursal</h3>
  
    <form [formGroup]="sucursalForm" (ngSubmit)="guardar()">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label text-secondary">Nombre de Sucursal</label>
          <input type="text" class="form-control" formControlName="nombre" placeholder="Ej: Sucursal Norte">
          <div *ngIf="sucursalForm.get('nombre')?.invalid && sucursalForm.get('nombre')?.touched" class="text-danger small mt-1">
            El nombre es requerido.
          </div>
        </div>
  
        <div class="col-md-6">
          <label class="form-label text-secondary">Teléfono</label>
          <input type="text" class="form-control" formControlName="telefono" placeholder="Ej: 388-1234567">
        </div>
  
        <div class="col-12">
          <label class="form-label text-secondary">Dirección</label>
          <input type="text" class="form-control" formControlName="direccion" placeholder="Ej: Av. General Paz 123">
        </div>
  
        <div class="col-md-4">
          <label class="form-label text-secondary">Latitud (Mapa)</label>
          <input type="number" class="form-control" formControlName="lat" placeholder="-24.185">
        </div>
  
        <div class="col-md-4">
          <label class="form-label text-secondary">Longitud (Mapa)</label>
          <input type="number" class="form-control" formControlName="lng" placeholder="-65.299">
        </div>
  
        <div class="col-md-4">
          <label class="form-label text-secondary">ID Zona</label>
          <input type="number" class="form-control" formControlName="zonaId" placeholder="Ej: 1">
        </div>
      </div>
  
      <div class="d-flex justify-content-end mt-4">
        <button type="button" class="btn btn-outline-primary me-3">Cancelar</button>
        <button type="submit" class="btn bg-primary text-white" [disabled]="sucursalForm.invalid">Guardar</button>
      </div>
    </form>
  </div>
