<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="text-primary fw-bold">Registro de Gastos</h2>
      <a routerLink="/gastos/nuevo" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> Nuevo Gasto
      </a>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-md-4">
        <select class="form-select" [(ngModel)]="filtroTipo">
          <option value="">Todos los tipos</option>
          <option value="Servicios">Servicios</option>
          <option value="Alquiler">Alquiler</option>
          <option value="Insumos">Insumos</option>
          <option value="Mantenimiento">Mantenimiento</option>
          <option value="Otros">Otros</option>
        </select>
      </div>
      <div class="col-md-4">
        <select class="form-select" [(ngModel)]="filtroSucursal">
          <option value="">Todas las sucursales</option>
          <option *ngFor="let s of sucursales" [value]="s.id">{{ s.nombre }}</option>
        </select>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table custom-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Tipo</th>
            <th>Descripción</th>
            <th>Monto</th>
            <th>Fecha</th>
            <th>Sucursal</th>
            <th>Proveedor</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let gasto of filtrados" [ngClass]="{'table-danger': gasto.anomalia}">
            <td>{{ gasto.id }}</td>
            <td>{{ gasto.tipo }}</td>
            <td>{{ gasto.descripcion }}</td>
            <td class="fw-bold">${{ gasto.monto }}</td>
            <td>{{ gasto.fecha | date:'dd/MM/yyyy' }}</td>
            <td>{{ gasto.sucursal?.nombre || '—' }}</td>
            <td>{{ gasto.proveedor?.nombre || '—' }}</td>
            <td>
              <span class="badge bg-danger p-2" *ngIf="gasto.anomalia">
                <i class="bi bi-exclamation-triangle"></i> Anomalía
              </span>
              <span class="badge bg-success p-2" *ngIf="!gasto.anomalia">
                <i class="bi bi-check-circle"></i> OK
              </span>
            </td>
            <td>
              <a [routerLink]="['/gastos/editar', gasto.id]" class="btn btn-sm btn-outline-primary me-2">
                <i class="bi bi-pencil"></i>
              </a>
              <button class="btn btn-sm bg-danger text-white" (click)="eliminarGasto(gasto.id)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
